# OpenEnv Configuration - Log Anomaly Investigation Environment
spec_version: 1
name: log_anomaly_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

# HuggingFace Space metadata (used in README.md frontmatter)
# These are duplicated here for openenv CLI compatibility
title: Log Anomaly Investigation Environment
emoji: "🔍"
colorFrom: purple
colorTo: blue
sdk: docker
pinned: false

# Tags for discovery
tags:
  - openenv
  - log-analysis
  - anomaly-detection
  - reinforcement-learning
  - devops
  - sre

# Task definitions (3 difficulty levels as required)
tasks:
  easy:
    difficulty: easy
    description: "Find and identify obvious error spikes in system logs."
    expected_score_range: [0.6, 1.0]

  medium:
    difficulty: medium
    description: "Investigate logs to identify various anomaly types."
    expected_score_range: [0.4, 0.8]

  hard:
    difficulty: hard
    description: "Investigate cascade failures requiring multi-hop temporal reasoning."
    expected_score_range: [0.3, 0.7]
